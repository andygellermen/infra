services:
  easy-event-planner:
    build:
      context: .
      args:
        EEP_VERSION: dev
    image: easy-event-planner:dev
    restart: unless-stopped
    environment:
      EEP_ENV: development
      EEP_HTTP_ADDR: :8080
      EEP_BASE_URL: http://localhost:8080
      EEP_DB_DRIVER: sqlite
      EEP_DB_PATH: /data/easy-event-planner.sqlite
    volumes:
      - ./data:/data
    ports:
      - "8080:8080"
