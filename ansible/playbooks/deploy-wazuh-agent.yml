---
- name: Deploy Wazuh agent for host monitoring
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars_files:
    - "{{ lookup('ansible.builtin.first_found', {'files': ['secrets.yml', 'secrets.yaml'], 'paths': [playbook_dir ~ '/../secrets']}) }}"

  roles:
    - wazuh_agent
