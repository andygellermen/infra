# /home/andy/infra/ansible/playbook/roles/ghost/tasks/main.yml
---
- debug:
    var: ghost_domain_db

- name: Create Ghost content volume
  community.docker.docker_volume:
    name: "ghost_{{ domain | replace('.', '_') }}_content"

- name: Build Ghost native analytics settings
  ansible.builtin.set_fact:
    ghost_native_analytics_enabled_effective: "{{ ghost_native_analytics_enabled | default(false) | bool }}"
    ghost_native_analytics_profile_key: "{{ ghost_native_analytics_profile | default('', true) }}"
    ghost_native_analytics_profile_payload: "{{ (ghost_native_analytics_profiles | default({}, true)).get((ghost_native_analytics_profile | default('', true)), {}) }}"
    ghost_native_analytics_service_name: "ghost-analytics-{{ domain | replace('.', '-') }}"
    ghost_native_analytics_router_name: "ghost-{{ domain | replace('.', '-') }}-analytics"
    ghost_native_analytics_volume_name: "ghost_{{ domain | replace('.', '_') }}_traffic_analytics_data"
    ghost_native_analytics_tracker_datasource_effective: "{{ ghost_native_analytics_tracker_datasource | default('analytics_events', true) }}"
    ghost_native_analytics_log_level_effective: "{{ ghost_native_analytics_log_level | default('info', true) }}"
    ghost_native_analytics_salt_store_type_effective: "{{ ghost_native_analytics_salt_store_type | default('file', true) }}"
    ghost_native_analytics_salt_store_file_path_effective: "{{ ghost_native_analytics_salt_store_file_path | default('/data/salts.json', true) }}"
    ghost_native_analytics_image_effective: "{{ ghost_native_analytics_image | default('ghost/traffic-analytics:1.0.205@sha256:284a71d8ab393280cd8b55a76689fcfccb709cf6bb29bfaf552f81562c823604', true) }}"

- name: Resolve Ghost native analytics profile values
  ansible.builtin.set_fact:
    ghost_native_analytics_api_url_effective: "{{ (ghost_native_analytics_profile_payload.api_url | default('', true) | regex_replace('/+$', '')) if (ghost_native_analytics_enabled | default(false) | bool) else '' }}"
    ghost_native_analytics_workspace_id_effective: "{{ ghost_native_analytics_profile_payload.workspace_id | default('', true) if (ghost_native_analytics_enabled | default(false) | bool) else '' }}"
    ghost_native_analytics_admin_token_effective: "{{ ghost_native_analytics_profile_payload.admin_token | default('', true) if (ghost_native_analytics_enabled | default(false) | bool) else '' }}"
    ghost_native_analytics_tracker_token_effective: "{{ ghost_native_analytics_profile_payload.tracker_token | default('', true) if (ghost_native_analytics_enabled | default(false) | bool) else '' }}"

- name: Ensure traefik docker network exists
  community.docker.docker_network:
    name: traefik
    driver: bridge
    attachable: true
    state: present

- name: Ensure backend docker network exists
  community.docker.docker_network:
    name: backend
    driver: bridge
    attachable: true
    state: present

- name: Validate Ghost native analytics profile settings
  ansible.builtin.assert:
    that:
      - ghost_native_analytics_profile_key | length > 0
      - ghost_native_analytics_profile_payload | length > 0
      - ghost_native_analytics_api_url_effective | length > 0
      - ghost_native_analytics_workspace_id_effective | length > 0
      - ghost_native_analytics_admin_token_effective | length > 0
      - ghost_native_analytics_tracker_token_effective | length > 0
    fail_msg: >-
      Ghost Native Analytics ist aktiv, aber das Profil '{{ ghost_native_analytics_profile_key }}'
      ist unvollständig oder fehlt in ansible/secrets/secrets.yml unter ghost_native_analytics_profiles.
  when: ghost_native_analytics_enabled_effective

- name: Create MySQL database for Ghost
  community.mysql.mysql_db:
    name: "{{ ghost_domain_db }}"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_host: 127.0.0.1

- name: Create MySQL user for Ghost
  community.mysql.mysql_user:
    name: "{{ ghost_domain_usr }}"
    password: "{{ ghost_domain_pwd }}"
    priv: "{{ ghost_domain_db }}.*:ALL"
    host: "%"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_host: 127.0.0.1

- name: Build Traefik labels
  ansible.builtin.set_fact:
    ghost_router_name: "ghost-{{ domain | replace('.', '-') }}"
    ghost_service_name: "ghost-{{ domain | replace('.', '-') }}"
    ghost_aliases: >-
      {{
        (traefik.aliases | default([], true))
        | difference([domain])
        | unique
      }}

- name: Build Traefik host rules
  ansible.builtin.set_fact:
    ghost_host_rule_primary: "Host(`{{ domain }}`)"
    ghost_host_rule_aliases: >-
      {{
        ghost_aliases
        | map('regex_replace', '^(.*)$', 'Host(`\1`)')
        | join(' || ')
      }}

- name: Build Ghost TLS settings
  ansible.builtin.set_fact:
    ghost_tls_mode: "{{ tls_mode | default('standard', true) }}"
    ghost_tls_wildcard_domain: "{{ tls_wildcard_domain | default('', true) }}"
    ghost_tls_certresolver: "{{ 'letsEncryptDns' if ((tls_mode | default('standard', true)) == 'wildcard' and (tls_wildcard_domain | default('', true) | length) > 0) else 'letsEncrypt' }}"

- name: Build Ghost TLS label maps
  ansible.builtin.set_fact:
    ghost_tls_domain_labels: >-
      {{
        {
          ('traefik.http.routers.' ~ ghost_router_name ~ '.tls.domains[0].main'): ghost_tls_wildcard_domain,
          ('traefik.http.routers.' ~ ghost_router_name ~ '.tls.domains[0].sans'): '*.' ~ ghost_tls_wildcard_domain,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-fallback.tls.domains[0].main'): ghost_tls_wildcard_domain,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-fallback.tls.domains[0].sans'): '*.' ~ ghost_tls_wildcard_domain,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-admin.tls.domains[0].main'): ghost_tls_wildcard_domain,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-admin.tls.domains[0].sans'): '*.' ~ ghost_tls_wildcard_domain,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-api.tls.domains[0].main'): ghost_tls_wildcard_domain,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-api.tls.domains[0].sans'): '*.' ~ ghost_tls_wildcard_domain,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-dotghost.tls.domains[0].main'): ghost_tls_wildcard_domain,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-dotghost.tls.domains[0].sans'): '*.' ~ ghost_tls_wildcard_domain,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-members-api.tls.domains[0].main'): ghost_tls_wildcard_domain,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-members-api.tls.domains[0].sans'): '*.' ~ ghost_tls_wildcard_domain
        }
        if (ghost_tls_mode == 'wildcard' and (ghost_tls_wildcard_domain | length) > 0)
        else {}
      }}
    ghost_tls_domain_labels_alias: >-
      {{
        {
          ('traefik.http.routers.' ~ ghost_router_name ~ '-alias.tls.domains[0].main'): ghost_tls_wildcard_domain,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-alias.tls.domains[0].sans'): '*.' ~ ghost_tls_wildcard_domain
        }
        if (ghost_tls_mode == 'wildcard' and (ghost_tls_wildcard_domain | length) > 0 and (ghost_aliases | length > 0))
        else {}
      }}
    ghost_native_analytics_tls_domain_labels: >-
      {{
        {
          ('traefik.http.routers.' ~ ghost_native_analytics_router_name ~ '.tls.domains[0].main'): ghost_tls_wildcard_domain,
          ('traefik.http.routers.' ~ ghost_native_analytics_router_name ~ '.tls.domains[0].sans'): '*.' ~ ghost_tls_wildcard_domain
        }
        if (ghost_native_analytics_enabled_effective and ghost_tls_mode == 'wildcard' and (ghost_tls_wildcard_domain | length) > 0)
        else {}
      }}

- name: Build Ghost middleware settings
  ansible.builtin.set_fact:
    ghost_middleware_default: "{{ ghost_traefik_middleware_default | default('') }}"
    ghost_middleware_admin: "{{ ghost_traefik_middleware_admin | default('crowdsec-admin@docker') }}"
    ghost_middleware_api: "{{ ghost_traefik_middleware_api | default('crowdsec-api@docker') }}"
    ghost_middleware_dotghost: "{{ ghost_traefik_middleware_dotghost | default(ghost_traefik_middleware_api | default('crowdsec-api@docker')) }}"
    ghost_middleware_members_api: "{{ ghost_traefik_middleware_members_api | default(ghost_traefik_middleware_api | default('crowdsec-api@docker')) }}"
    ghost_middleware_native_analytics: "{{ ghost_traefik_middleware_native_analytics | default(ghost_traefik_middleware_api | default('crowdsec-api@docker')) }}"

- name: Build optional Ghost middleware labels
  ansible.builtin.set_fact:
    ghost_labels_middleware_default: "{{ ({ ('traefik.http.routers.' ~ ghost_router_name ~ '.middlewares'): ghost_middleware_default }) if (ghost_middleware_default | length > 0) else {} }}"
    ghost_labels_middleware_admin: "{{ ({ ('traefik.http.routers.' ~ ghost_router_name ~ '-admin.middlewares'): ghost_middleware_admin }) if (ghost_middleware_admin | length > 0) else {} }}"
    ghost_labels_middleware_api: "{{ ({ ('traefik.http.routers.' ~ ghost_router_name ~ '-api.middlewares'): ghost_middleware_api }) if (ghost_middleware_api | length > 0) else {} }}"
    ghost_labels_middleware_dotghost: "{{ ({ ('traefik.http.routers.' ~ ghost_router_name ~ '-dotghost.middlewares'): ghost_middleware_dotghost }) if (ghost_middleware_dotghost | length > 0) else {} }}"
    ghost_labels_middleware_members_api: "{{ ({ ('traefik.http.routers.' ~ ghost_router_name ~ '-members-api.middlewares'): ghost_middleware_members_api }) if (ghost_middleware_members_api | length > 0) else {} }}"

- name: Build optional alias router labels
  ansible.builtin.set_fact:
    ghost_labels_alias_redirect: >-
      {{
        {
          ('traefik.http.middlewares.' ~ ghost_router_name ~ '-alias-redirect-url.redirectregex.regex'): '^https?://[^/]+(?:/(.*))?$',
          ('traefik.http.middlewares.' ~ ghost_router_name ~ '-alias-redirect-url.redirectregex.replacement'): 'https://' ~ domain ~ '/$1',
          ('traefik.http.middlewares.' ~ ghost_router_name ~ '-alias-redirect-url.redirectregex.permanent'): 'true',
          ('traefik.http.middlewares.' ~ ghost_router_name ~ '-alias-redirect-path.redirectregex.regex'): '^/(.*)$',
          ('traefik.http.middlewares.' ~ ghost_router_name ~ '-alias-redirect-path.redirectregex.replacement'): 'https://' ~ domain ~ '/$1',
          ('traefik.http.middlewares.' ~ ghost_router_name ~ '-alias-redirect-path.redirectregex.permanent'): 'true',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-alias.entrypoints'): 'websecure',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-alias.rule'): ghost_host_rule_aliases,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-alias.priority'): '300',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-alias.tls'): 'true',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-alias.tls.certresolver'): ghost_tls_certresolver,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-alias.middlewares'): ghost_router_name ~ '-alias-redirect-url,' ~ ghost_router_name ~ '-alias-redirect-path',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-alias.service'): 'noop@internal',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-alias-web.entrypoints'): 'web',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-alias-web.rule'): ghost_host_rule_aliases,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-alias-web.priority'): '300',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-alias-web.middlewares'): ghost_router_name ~ '-alias-redirect-url,' ~ ghost_router_name ~ '-alias-redirect-path',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-alias-web.service'): 'noop@internal'
        }
        | combine(ghost_tls_domain_labels_alias)
        if (ghost_aliases | length > 0) else {}
      }}

- name: Build Ghost native analytics Traefik labels
  ansible.builtin.set_fact:
    ghost_native_analytics_middlewares: >-
      {{
        (
          ([ghost_middleware_native_analytics] if (ghost_middleware_native_analytics | length > 0) else [])
          + [ghost_native_analytics_router_name ~ '-strip']
        ) | join(',')
      }}
    ghost_native_analytics_labels: >-
      {{
        {
          'traefik.enable': 'true',
          'traefik.docker.network': 'traefik',
          ('traefik.http.middlewares.' ~ ghost_native_analytics_router_name ~ '-strip.stripprefix.prefixes'): '/.ghost/analytics',
          ('traefik.http.routers.' ~ ghost_native_analytics_router_name ~ '.entrypoints'): 'websecure',
          ('traefik.http.routers.' ~ ghost_native_analytics_router_name ~ '.rule'): '(' ~ ghost_host_rule_primary ~ ') && PathPrefix(`/.ghost/analytics`)',
          ('traefik.http.routers.' ~ ghost_native_analytics_router_name ~ '.priority'): '240',
          ('traefik.http.routers.' ~ ghost_native_analytics_router_name ~ '.tls'): 'true',
          ('traefik.http.routers.' ~ ghost_native_analytics_router_name ~ '.tls.certresolver'): ghost_tls_certresolver,
          ('traefik.http.routers.' ~ ghost_native_analytics_router_name ~ '.middlewares'): ghost_native_analytics_middlewares,
          ('traefik.http.routers.' ~ ghost_native_analytics_router_name ~ '.service'): ghost_native_analytics_service_name,
          ('traefik.http.services.' ~ ghost_native_analytics_service_name ~ '.loadbalancer.server.port'): '3000'
        }
        | combine(ghost_native_analytics_tls_domain_labels)
        if ghost_native_analytics_enabled_effective else {}
      }}

- name: Build Traefik labels map
  ansible.builtin.set_fact:
    ghost_labels: >-
      {{
        {
          'traefik.enable': 'true',
          'traefik.docker.network': 'traefik'
        }
        | combine({
          ('traefik.http.routers.' ~ ghost_router_name ~ '.entrypoints'): 'websecure',
          ('traefik.http.routers.' ~ ghost_router_name ~ '.rule'): ghost_host_rule_primary,
          ('traefik.http.routers.' ~ ghost_router_name ~ '.priority'): '100',
          ('traefik.http.routers.' ~ ghost_router_name ~ '.tls'): 'true',
          ('traefik.http.routers.' ~ ghost_router_name ~ '.tls.certresolver'): ghost_tls_certresolver,
          ('traefik.http.routers.' ~ ghost_router_name ~ '.service'): ghost_service_name,

          ('traefik.http.routers.' ~ ghost_router_name ~ '-fallback.entrypoints'): 'websecure',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-fallback.rule'): ghost_host_rule_primary,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-fallback.priority'): '1',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-fallback.tls'): 'true',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-fallback.tls.certresolver'): ghost_tls_certresolver,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-fallback.service'): ghost_service_name,

          ('traefik.http.middlewares.' ~ ghost_router_name ~ '-https-redirect.redirectscheme.scheme'): 'https',
          ('traefik.http.middlewares.' ~ ghost_router_name ~ '-https-redirect.redirectscheme.permanent'): 'true',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-web.entrypoints'): 'web',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-web.rule'): ghost_host_rule_primary,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-web.priority'): '100',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-web.middlewares'): ghost_router_name ~ '-https-redirect',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-web.service'): 'noop@internal',

          ('traefik.http.routers.' ~ ghost_router_name ~ '-admin.entrypoints'): 'websecure',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-admin.rule'): '(' ~ ghost_host_rule_primary ~ ') && PathPrefix(`/ghost`)',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-admin.priority'): '200',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-admin.tls'): 'true',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-admin.tls.certresolver'): ghost_tls_certresolver,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-admin.service'): ghost_service_name,

          ('traefik.http.routers.' ~ ghost_router_name ~ '-api.entrypoints'): 'websecure',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-api.rule'): '(' ~ ghost_host_rule_primary ~ ') && PathPrefix(`/ghost/api`)',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-api.priority'): '220',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-api.tls'): 'true',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-api.tls.certresolver'): ghost_tls_certresolver,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-api.service'): ghost_service_name,

          ('traefik.http.routers.' ~ ghost_router_name ~ '-dotghost.entrypoints'): 'websecure',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-dotghost.rule'): '(' ~ ghost_host_rule_primary ~ ') && PathPrefix(`/.ghost`)',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-dotghost.priority'): '230',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-dotghost.tls'): 'true',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-dotghost.tls.certresolver'): ghost_tls_certresolver,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-dotghost.service'): ghost_service_name,

          ('traefik.http.routers.' ~ ghost_router_name ~ '-members-api.entrypoints'): 'websecure',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-members-api.rule'): '(' ~ ghost_host_rule_primary ~ ') && PathPrefix(`/members/api`)',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-members-api.priority'): '210',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-members-api.tls'): 'true',
          ('traefik.http.routers.' ~ ghost_router_name ~ '-members-api.tls.certresolver'): ghost_tls_certresolver,
          ('traefik.http.routers.' ~ ghost_router_name ~ '-members-api.service'): ghost_service_name,

          ('traefik.http.services.' ~ ghost_service_name ~ '.loadbalancer.server.port'): '2368'
        })
        | combine(ghost_labels_middleware_default)
        | combine(ghost_labels_middleware_admin)
        | combine(ghost_labels_middleware_api)
        | combine(ghost_labels_middleware_dotghost)
        | combine(ghost_labels_middleware_members_api)
        | combine(ghost_tls_domain_labels)
        | combine(ghost_labels_alias_redirect)
      }}

- name: Build Ghost image editor notice settings
  ansible.builtin.set_fact:
    ghost_image_editor_notice_enabled_effective: "{{ ghost_image_editor_notice_enabled | default(false) | bool }}"
    ghost_image_editor_notice_install_url_effective: "{{ ghost_image_editor_notice_install_url | default('https://github.com/andygellermen/ghost-image-editor/', true) }}"
    ghost_image_editor_notice_remind_hours_effective: "{{ ghost_image_editor_notice_remind_hours | default(24, true) | int }}"
    ghost_image_editor_notice_extra_title_effective: "{{ ghost_image_editor_notice_extra_title | default('', true) }}"
    ghost_image_editor_notice_extra_text_effective: "{{ ghost_image_editor_notice_extra_text | default('', true) }}"
    ghost_admin_overlay_dir: "/srv/ghost-admin-overlay/{{ domain }}"

- name: Validate Ghost image editor notice settings
  ansible.builtin.assert:
    that:
      - ghost_image_editor_notice_install_url_effective | length > 0
      - ghost_image_editor_notice_remind_hours_effective > 0
    fail_msg: "Ghost image editor notice settings sind ungueltig. Bitte ghost_image_editor_notice_install_url und ghost_image_editor_notice_remind_hours pruefen."
  when: ghost_image_editor_notice_enabled_effective

- name: Ensure Ghost admin overlay directory exists
  ansible.builtin.file:
    path: "{{ ghost_admin_overlay_dir }}"
    state: directory
    mode: "0755"
  become: true
  when: ghost_image_editor_notice_enabled_effective

- name: Install Ghost admin overlay launcher
  ansible.builtin.copy:
    src: ghost-admin-overlay/start.sh
    dest: "{{ ghost_admin_overlay_dir }}/start.sh"
    mode: "0755"
  become: true
  when: ghost_image_editor_notice_enabled_effective

- name: Render Ghost image editor helper script
  ansible.builtin.template:
    src: ghost-admin-overlay/ghost-image-editor-helper.js.j2
    dest: "{{ ghost_admin_overlay_dir }}/ghost-image-editor-helper.js"
    mode: "0644"
  become: true
  when: ghost_image_editor_notice_enabled_effective

- name: Build Ghost container volume list
  ansible.builtin.set_fact:
    ghost_container_volumes: >-
      {{
        [
          'ghost_' ~ (domain | replace('.', '_')) ~ '_content:/var/lib/ghost/content'
        ]
        + (
          [ghost_admin_overlay_dir ~ ':/opt/ghost-admin-overlay:ro']
          if ghost_image_editor_notice_enabled_effective
          else []
        )
      }}

- name: Build Ghost container environment
  ansible.builtin.set_fact:
    ghost_container_env: >-
      {{
        {
          'url': 'https://' ~ domain,
          'NODE_ENV': ghost_env | default('production'),
          'database__client': 'mysql',
          'database__connection__host': 'infra-mysql',
          'database__connection__user': ghost_domain_usr,
          'database__connection__password': ghost_domain_pwd,
          'database__connection__database': ghost_domain_db,
          'mail__transport': 'SMTP',
          'mail__options__host': ses_smtp_host | default('email-smtp.eu-central-1.amazonaws.com'),
          'mail__options__port': ses_smtp_port | default(587) | string,
          'mail__options__secure': ses_smtp_secure | default(false) | bool | lower,
          'mail__options__requireTLS': ses_smtp_requireTLS | default(true) | bool | lower,
          'mail__options__auth__user': ses_smtp_user,
          'mail__options__auth__pass': ses_smtp_password,
          'mail__from': ses_from | default('noreply@' ~ domain),
          'TINYBIRD_ENABLED': tinybird_enabled | default(true) | bool | lower,
          'TINYBIRD_API_URL': tinybird_api_url | default('https://api.tinybird.co'),
          'TINYBIRD_WORKSPACE': tinybird_workspace | default('main'),
          'TINYBIRD_DATASOURCE': tinybird_datasource | default('ghost_pageviews_' ~ (domain | replace('.', '__') | replace('-', '__'))),
          'TINYBIRD_TOKEN': tinybird_token | default(''),
          'TINYBIRD_EVENTS_ENDPOINT': tinybird_events_endpoint | default('/v0/events?name=pageviews')
        }
        | combine(
          {
            'tinybird__tracker__endpoint': 'https://' ~ domain ~ '/.ghost/analytics/api/v1/page_hit',
            'tinybird__adminToken': ghost_native_analytics_admin_token_effective,
            'tinybird__workspaceId': ghost_native_analytics_workspace_id_effective,
            'tinybird__tracker__datasource': ghost_native_analytics_tracker_datasource_effective,
            'tinybird__stats__endpoint': ghost_native_analytics_api_url_effective
          }
          if ghost_native_analytics_enabled_effective
          else {}
        )
      }}

- name: Create Ghost native analytics salt volume
  community.docker.docker_volume:
    name: "{{ ghost_native_analytics_volume_name }}"
  when: ghost_native_analytics_enabled_effective

- name: Deploy Ghost native analytics container
  community.docker.docker_container:
    name: "{{ ghost_native_analytics_service_name }}"
    image: "{{ ghost_native_analytics_image_effective }}"
    pull: true
    restart_policy: unless-stopped
    recreate: true
    networks:
      - name: traefik
    volumes:
      - "{{ ghost_native_analytics_volume_name }}:/data"
    env:
      NODE_ENV: production
      PROXY_TARGET: "{{ ghost_native_analytics_api_url_effective }}/v0/events"
      SALT_STORE_TYPE: "{{ ghost_native_analytics_salt_store_type_effective }}"
      SALT_STORE_FILE_PATH: "{{ ghost_native_analytics_salt_store_file_path_effective }}"
      TINYBIRD_TRACKER_TOKEN: "{{ ghost_native_analytics_tracker_token_effective }}"
      LOG_LEVEL: "{{ ghost_native_analytics_log_level_effective }}"
    labels: "{{ ghost_native_analytics_labels }}"
  when: ghost_native_analytics_enabled_effective

- name: Remove Ghost native analytics container when disabled
  community.docker.docker_container:
    name: "{{ ghost_native_analytics_service_name }}"
    state: absent
  when: not ghost_native_analytics_enabled_effective

- name: Deploy Ghost container
  community.docker.docker_container:
    name: "ghost-{{ domain | replace('.', '-') }}"
    image: "ghost:{{ ghost_version | default('latest') }}"
    # Floating tags like `latest` or `6` need an explicit pull, otherwise Docker
    # can keep serving an older locally cached image.
    pull: true
    restart_policy: unless-stopped
    recreate: true
    networks:
      - name: traefik
      - name: backend
    volumes: "{{ ghost_container_volumes }}"
    # Wichtig: alte /etc/hosts-Overrides (z.B. aus früheren Deployments) explizit entfernen
    etc_hosts: {}
    command: "{{ ['/opt/ghost-admin-overlay/start.sh'] if ghost_image_editor_notice_enabled_effective else omit }}"
    env: "{{ ghost_container_env }}"
    labels: "{{ ghost_labels }}"
