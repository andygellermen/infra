---
- name: Create WordPress html volume
  community.docker.docker_volume:
    name: "wp_{{ domain | replace('.', '_') }}_html"

- name: Ensure traefik docker network exists
  community.docker.docker_network:
    name: traefik
    driver: bridge
    attachable: true
    state: present

- name: Ensure backend docker network exists
  community.docker.docker_network:
    name: backend
    driver: bridge
    attachable: true
    state: present

- name: Create MySQL database for WordPress
  community.mysql.mysql_db:
    name: "{{ wp_domain_db }}"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_host: 127.0.0.1

- name: Create MySQL user for WordPress
  community.mysql.mysql_user:
    name: "{{ wp_domain_usr }}"
    password: "{{ wp_domain_pwd }}"
    priv: "{{ wp_domain_db }}.*:ALL"
    host: "%"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_host: 127.0.0.1

- name: Build Traefik labels
  ansible.builtin.set_fact:
    wp_router_name: "wp-{{ domain | replace('.', '-') }}"
    wp_service_name: "wp-{{ domain | replace('.', '-') }}"
    wp_aliases: "{{ (traefik.aliases | default([], true)) | difference([domain]) | unique }}"

- name: Build Traefik host rules
  ansible.builtin.set_fact:
    wp_host_rule_primary: "Host(`{{ domain }}`)"
    wp_host_rule_aliases: "{{ wp_aliases | map('regex_replace', '^(.*)$', 'Host(`\\1`)') | join(' || ') }}"

- name: Build WordPress TLS settings
  ansible.builtin.set_fact:
    wp_tls_mode: "{{ tls_mode | default('standard', true) }}"
    wp_tls_wildcard_domain: "{{ tls_wildcard_domain | default('', true) }}"
    wp_tls_certresolver: "{{ 'letsEncryptDns' if ((tls_mode | default('standard', true)) == 'wildcard' and (tls_wildcard_domain | default('', true) | length) > 0) else 'letsEncrypt' }}"
    wp_tls_domain_labels: >-
      {{
        {
          ('traefik.http.routers.' ~ wp_router_name ~ '.tls.domains[0].main'): wp_tls_wildcard_domain,
          ('traefik.http.routers.' ~ wp_router_name ~ '.tls.domains[0].sans'): '*.' ~ wp_tls_wildcard_domain,
          ('traefik.http.routers.' ~ wp_router_name ~ '-admin.tls.domains[0].main'): wp_tls_wildcard_domain,
          ('traefik.http.routers.' ~ wp_router_name ~ '-admin.tls.domains[0].sans'): '*.' ~ wp_tls_wildcard_domain,
          ('traefik.http.routers.' ~ wp_router_name ~ '-api.tls.domains[0].main'): wp_tls_wildcard_domain,
          ('traefik.http.routers.' ~ wp_router_name ~ '-api.tls.domains[0].sans'): '*.' ~ wp_tls_wildcard_domain
        }
        if (wp_tls_mode == 'wildcard' and (wp_tls_wildcard_domain | length) > 0)
        else {}
      }}
    wp_tls_domain_labels_alias: >-
      {{
        {
          ('traefik.http.routers.' ~ wp_router_name ~ '-alias.tls.domains[0].main'): wp_tls_wildcard_domain,
          ('traefik.http.routers.' ~ wp_router_name ~ '-alias.tls.domains[0].sans'): '*.' ~ wp_tls_wildcard_domain
        }
        if (wp_tls_mode == 'wildcard' and (wp_tls_wildcard_domain | length) > 0 and (wp_aliases | length > 0))
        else {}
      }}

- name: Build WordPress middleware settings
  ansible.builtin.set_fact:
    wp_requested_middleware_default: "{{ wp_traefik_middleware_default | default('', true) }}"
    wp_requested_middleware_admin: "{{ wp_traefik_middleware_admin | default('', true) }}"
    wp_requested_middleware_api: "{{ wp_traefik_middleware_api | default('', true) }}"

- name: Check if CrowdSec Traefik bouncer is running
  community.docker.docker_container_info:
    name: crowdsec-bouncer-traefik
  register: wp_crowdsec_bouncer
  failed_when: false
  changed_when: false

- name: Resolve active middleware settings
  ansible.builtin.set_fact:
    wp_crowdsec_available: "{{ wp_crowdsec_bouncer.exists | default(false) and (wp_crowdsec_bouncer.container.State.Running | default(false)) }}"
    wp_middleware_default: >-
      {{
        wp_requested_middleware_default
        if (
          (wp_requested_middleware_default | length > 0)
          and (
            ('crowdsec-' not in wp_requested_middleware_default)
            or wp_crowdsec_available
          )
        )
        else ''
      }}
    wp_middleware_admin: >-
      {{
        wp_requested_middleware_admin
        if (
          (wp_requested_middleware_admin | length > 0)
          and (
            ('crowdsec-' not in wp_requested_middleware_admin)
            or wp_crowdsec_available
          )
        )
        else ''
      }}
    wp_middleware_api: >-
      {{
        wp_requested_middleware_api
        if (
          (wp_requested_middleware_api | length > 0)
          and (
            ('crowdsec-' not in wp_requested_middleware_api)
            or wp_crowdsec_available
          )
        )
        else ''
      }}

- name: Initialize WordPress basic-auth map
  ansible.builtin.set_fact:
    wp_basic_auth_map: {}

- name: Build WordPress basic-auth map
  ansible.builtin.set_fact:
    wp_basic_auth_map: "{{ wp_basic_auth_map | combine({ (item.scope): item }) }}"
  loop: "{{ wp_basic_auth_scopes | default([], true) }}"
  when:
    - (item.scope | default('', true)) in ['frontend', 'admin', 'api']
    - (item.username | default('', true) | length) > 0
    - (item.password_hash | default('', true) | length) > 0

- name: Resolve WordPress basic-auth scope entries
  ansible.builtin.set_fact:
    wp_basic_auth_frontend: "{{ wp_basic_auth_map.get('frontend', {}) }}"
    wp_basic_auth_admin: "{{ wp_basic_auth_map.get('admin', {}) }}"
    wp_basic_auth_api: "{{ wp_basic_auth_map.get('api', {}) }}"

- name: Build effective router middleware chains
  ansible.builtin.set_fact:
    wp_router_middlewares_frontend: "{{ (([wp_middleware_default] if (wp_middleware_default | length > 0) else []) + ([wp_router_name ~ '-basic-auth-frontend'] if (wp_basic_auth_frontend | length > 0) else [])) | join(',') }}"
    wp_router_middlewares_admin: "{{ (([wp_middleware_admin] if (wp_middleware_admin | length > 0) else []) + ([wp_router_name ~ '-basic-auth-admin'] if (wp_basic_auth_admin | length > 0) else [])) | join(',') }}"
    wp_router_middlewares_api: "{{ (([wp_middleware_api] if (wp_middleware_api | length > 0) else []) + ([wp_router_name ~ '-basic-auth-api'] if (wp_basic_auth_api | length > 0) else [])) | join(',') }}"

- name: Build router middleware labels
  ansible.builtin.set_fact:
    wp_labels_middleware_default: "{{ ({ ('traefik.http.routers.' ~ wp_router_name ~ '.middlewares'): wp_router_middlewares_frontend }) if (wp_router_middlewares_frontend | length > 0) else {} }}"
    wp_labels_middleware_admin: "{{ ({ ('traefik.http.routers.' ~ wp_router_name ~ '-admin.middlewares'): wp_router_middlewares_admin }) if (wp_router_middlewares_admin | length > 0) else {} }}"
    wp_labels_middleware_api: "{{ ({ ('traefik.http.routers.' ~ wp_router_name ~ '-api.middlewares'): wp_router_middlewares_api }) if (wp_router_middlewares_api | length > 0) else {} }}"

- name: Build optional basic-auth middleware labels
  ansible.builtin.set_fact:
    wp_labels_basic_auth_frontend: "{{ ({ ('traefik.http.middlewares.' ~ wp_router_name ~ '-basic-auth-frontend.basicauth.realm'): (wp_basic_auth_frontend.realm | default('Protected Website', true)), ('traefik.http.middlewares.' ~ wp_router_name ~ '-basic-auth-frontend.basicauth.users'): (wp_basic_auth_frontend.username ~ ':' ~ wp_basic_auth_frontend.password_hash) }) if (wp_basic_auth_frontend | length > 0) else {} }}"
    wp_labels_basic_auth_admin: "{{ ({ ('traefik.http.middlewares.' ~ wp_router_name ~ '-basic-auth-admin.basicauth.realm'): (wp_basic_auth_admin.realm | default('Protected Admin', true)), ('traefik.http.middlewares.' ~ wp_router_name ~ '-basic-auth-admin.basicauth.users'): (wp_basic_auth_admin.username ~ ':' ~ wp_basic_auth_admin.password_hash) }) if (wp_basic_auth_admin | length > 0) else {} }}"
    wp_labels_basic_auth_api: "{{ ({ ('traefik.http.middlewares.' ~ wp_router_name ~ '-basic-auth-api.basicauth.realm'): (wp_basic_auth_api.realm | default('Protected API', true)), ('traefik.http.middlewares.' ~ wp_router_name ~ '-basic-auth-api.basicauth.users'): (wp_basic_auth_api.username ~ ':' ~ wp_basic_auth_api.password_hash) }) if (wp_basic_auth_api | length > 0) else {} }}"

- name: Build optional alias router labels
  ansible.builtin.set_fact:
    wp_labels_alias_redirect: >-
      {{
        {
          ('traefik.http.middlewares.' ~ wp_router_name ~ '-alias-redirect-url.redirectregex.regex'): '^https?://[^/]+(?:/(.*))?$',
          ('traefik.http.middlewares.' ~ wp_router_name ~ '-alias-redirect-url.redirectregex.replacement'): 'https://' ~ domain ~ '/$1',
          ('traefik.http.middlewares.' ~ wp_router_name ~ '-alias-redirect-url.redirectregex.permanent'): 'true',
          ('traefik.http.middlewares.' ~ wp_router_name ~ '-alias-redirect-path.redirectregex.regex'): '^/(.*)$',
          ('traefik.http.middlewares.' ~ wp_router_name ~ '-alias-redirect-path.redirectregex.replacement'): 'https://' ~ domain ~ '/$1',
          ('traefik.http.middlewares.' ~ wp_router_name ~ '-alias-redirect-path.redirectregex.permanent'): 'true',
          ('traefik.http.routers.' ~ wp_router_name ~ '-alias.entrypoints'): 'websecure',
          ('traefik.http.routers.' ~ wp_router_name ~ '-alias.rule'): wp_host_rule_aliases,
          ('traefik.http.routers.' ~ wp_router_name ~ '-alias.priority'): '300',
          ('traefik.http.routers.' ~ wp_router_name ~ '-alias.tls'): 'true',
          ('traefik.http.routers.' ~ wp_router_name ~ '-alias.tls.certresolver'): wp_tls_certresolver,
          ('traefik.http.routers.' ~ wp_router_name ~ '-alias.middlewares'): wp_router_name ~ '-alias-redirect-url,' ~ wp_router_name ~ '-alias-redirect-path',
          ('traefik.http.routers.' ~ wp_router_name ~ '-alias.service'): 'noop@internal',
          ('traefik.http.routers.' ~ wp_router_name ~ '-alias-web.entrypoints'): 'web',
          ('traefik.http.routers.' ~ wp_router_name ~ '-alias-web.rule'): wp_host_rule_aliases,
          ('traefik.http.routers.' ~ wp_router_name ~ '-alias-web.priority'): '300',
          ('traefik.http.routers.' ~ wp_router_name ~ '-alias-web.middlewares'): wp_router_name ~ '-alias-redirect-url,' ~ wp_router_name ~ '-alias-redirect-path',
          ('traefik.http.routers.' ~ wp_router_name ~ '-alias-web.service'): 'noop@internal'
        }
        | combine(wp_tls_domain_labels_alias)
        if (wp_aliases | length > 0) else {}
      }}

- name: Build Traefik labels map
  ansible.builtin.set_fact:
    wp_labels: >-
      {{
        {
          'traefik.enable': 'true',
          'traefik.docker.network': 'traefik',
          ('traefik.http.routers.' ~ wp_router_name ~ '.entrypoints'): 'websecure',
          ('traefik.http.routers.' ~ wp_router_name ~ '.rule'): wp_host_rule_primary,
          ('traefik.http.routers.' ~ wp_router_name ~ '.tls'): 'true',
          ('traefik.http.routers.' ~ wp_router_name ~ '.tls.certresolver'): wp_tls_certresolver,
          ('traefik.http.routers.' ~ wp_router_name ~ '.service'): wp_service_name,
          ('traefik.http.middlewares.' ~ wp_router_name ~ '-https-redirect.redirectscheme.scheme'): 'https',
          ('traefik.http.middlewares.' ~ wp_router_name ~ '-https-redirect.redirectscheme.permanent'): 'true',
          ('traefik.http.routers.' ~ wp_router_name ~ '-web.entrypoints'): 'web',
          ('traefik.http.routers.' ~ wp_router_name ~ '-web.rule'): wp_host_rule_primary,
          ('traefik.http.routers.' ~ wp_router_name ~ '-web.priority'): '200',
          ('traefik.http.routers.' ~ wp_router_name ~ '-web.middlewares'): wp_router_name ~ '-https-redirect',
          ('traefik.http.routers.' ~ wp_router_name ~ '-web.service'): 'noop@internal',

          ('traefik.http.routers.' ~ wp_router_name ~ '-admin.entrypoints'): 'websecure',
          ('traefik.http.routers.' ~ wp_router_name ~ '-admin.rule'): '(' ~ wp_host_rule_primary ~ ') && (PathPrefix(`/wp-admin`) || Path(`/wp-login.php`))',
          ('traefik.http.routers.' ~ wp_router_name ~ '-admin.priority'): '220',
          ('traefik.http.routers.' ~ wp_router_name ~ '-admin.tls'): 'true',
          ('traefik.http.routers.' ~ wp_router_name ~ '-admin.tls.certresolver'): wp_tls_certresolver,
          ('traefik.http.routers.' ~ wp_router_name ~ '-admin.service'): wp_service_name,

          ('traefik.http.routers.' ~ wp_router_name ~ '-api.entrypoints'): 'websecure',
          ('traefik.http.routers.' ~ wp_router_name ~ '-api.rule'): '(' ~ wp_host_rule_primary ~ ') && PathPrefix(`/wp-json`)',
          ('traefik.http.routers.' ~ wp_router_name ~ '-api.priority'): '210',
          ('traefik.http.routers.' ~ wp_router_name ~ '-api.tls'): 'true',
          ('traefik.http.routers.' ~ wp_router_name ~ '-api.tls.certresolver'): wp_tls_certresolver,
          ('traefik.http.routers.' ~ wp_router_name ~ '-api.service'): wp_service_name,

          ('traefik.http.services.' ~ wp_service_name ~ '.loadbalancer.server.port'): '80'
        }
        | combine(wp_labels_middleware_default)
        | combine(wp_labels_middleware_admin)
        | combine(wp_labels_middleware_api)
        | combine(wp_labels_basic_auth_frontend)
        | combine(wp_labels_basic_auth_admin)
        | combine(wp_labels_basic_auth_api)
        | combine(wp_tls_domain_labels)
        | combine(wp_labels_alias_redirect)
      }}

- name: Deploy WordPress container
  community.docker.docker_container:
    name: "wp-{{ domain | replace('.', '-') }}"
    image: "wordpress:{{ wp_image_tag | default(wp_version | default('latest')) }}"
    restart_policy: unless-stopped
    recreate: true
    networks:
      - name: backend
      - name: traefik
    volumes:
      - "wp_{{ domain | replace('.', '_') }}_html:/var/www/html"
    env:
      WORDPRESS_DB_HOST: "infra-mysql"
      WORDPRESS_DB_USER: "{{ wp_domain_usr }}"
      WORDPRESS_DB_PASSWORD: "{{ wp_domain_pwd }}"
      WORDPRESS_DB_NAME: "{{ wp_domain_db }}"
      WORDPRESS_TABLE_PREFIX: "{{ wp_table_prefix | default('wp_') }}"
      WORDPRESS_CONFIG_EXTRA: |
        define('FORCE_SSL_ADMIN', true);
        if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
          $_SERVER['HTTPS'] = 'on';
        }
    labels: "{{ wp_labels }}"
