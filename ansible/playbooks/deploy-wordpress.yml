---
- name: Deploy WordPress for specific domain
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - "{{ lookup('ansible.builtin.first_found', {'files': ['secrets.yml', 'secrets.yaml'], 'paths': [playbook_dir ~ '/../secrets']}) }}"
    - "../hostvars/{{ target_domain }}.yml"

  roles:
    - wordpress
