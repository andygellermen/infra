# ~/infra/ansible/playbooks/deploy-portainer.yml
---
- name: Deploy Portainer
  hosts: localhost
  connection: local
  become: true

  tasks:
    - name: Normalize Portainer variable when passed as string
      ansible.builtin.set_fact:
        portainer: "{{ portainer | from_yaml }}"
      when:
        - portainer is defined
        - portainer is string

    - name: Resolve Portainer domain from supported inputs
      ansible.builtin.set_fact:
        portainer_domain_resolved: >-
          {{ portainer.domain | default(portainer_domain | default('')) }}

    - name: Validate Portainer domain variable
      ansible.builtin.assert:
        that:
          - portainer_domain_resolved | length > 0
        fail_msg: >-
          Bitte Portainer-Domain setzen, z. B. via
          -e '{"portainer":{"domain":"portainer.example.com"}}'
          oder
          -e 'portainer_domain=portainer.example.com'.

    - name: Ensure traefik network exists
      community.docker.docker_network:
        name: traefik
        driver: bridge
        attachable: true
        state: present

    - name: Ensure Portainer volume exists
      community.docker.docker_volume:
        name: portainer_data
        state: present

    - name: Deploy Portainer container
      community.docker.docker_container:
        name: infra-portainer
        image: portainer/portainer-ce:latest
        restart_policy: unless-stopped
        networks:
          - name: traefik
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
          - portainer_data:/data
        labels:
          traefik.enable: "true"

          traefik.http.routers.portainer.rule: "Host(`{{ portainer_domain_resolved }}`)"
          traefik.http.routers.portainer.entrypoints: "websecure"
          traefik.http.routers.portainer.middlewares: "crowdsec-admin@docker"
          traefik.http.routers.portainer.tls: "true"
          traefik.http.routers.portainer.tls.certresolver: "letsEncrypt"

          traefik.http.services.portainer.loadbalancer.server.port: "9000"
