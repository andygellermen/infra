---
# Zentrale Wildcard-Verteilung fuer die drei MietFirma-Stage-Server.
# Diese Datei wird auf dem Traefik-/ACME-Quellserver genutzt.
wildcard_exports:
  - source_domain: miethaenger.com
    acme_file: /home/andy/infra/data/traefik/acme/acme.json
    targets:
      - name: live-server
        host: 116.203.182.136
        user: root
        port: 22
        identity_file: /root/.ssh/id_wildcard_stage
        known_hosts_file: /root/.ssh/known_hosts
        remote_fullchain_path: /etc/letsencrypt/live/miethaenger.com/fullchain.pem
        remote_privkey_path: /etc/letsencrypt/live/miethaenger.com/privkey.pem
        owner: root
        group: root
        fullchain_mode: "0644"
        privkey_mode: "0600"
        post_deploy_command: "apache2ctl -t && systemctl reload apache2"

      - name: backup-server
        host: 49.13.158.205
        user: root
        port: 22
        identity_file: /root/.ssh/id_wildcard_stage
        known_hosts_file: /root/.ssh/known_hosts
        remote_fullchain_path: /etc/letsencrypt/live/miethaenger.com/fullchain.pem
        remote_privkey_path: /etc/letsencrypt/live/miethaenger.com/privkey.pem
        owner: root
        group: root
        fullchain_mode: "0644"
        privkey_mode: "0600"
        post_deploy_command: "apache2ctl -t && systemctl reload apache2"

      - name: test-server
        host: 188.245.223.161
        user: root
        port: 22
        identity_file: /root/.ssh/id_wildcard_stage
        known_hosts_file: /root/.ssh/known_hosts
